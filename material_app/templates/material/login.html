<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - MMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }

        .login-wrap {
            width: 100%;
            max-width: 380px;
            padding: 0 20px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-title h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #111;
            margin: 0;
            letter-spacing: -0.3px;
        }

        .login-title p {
            font-size: 0.85rem;
            color: #999;
            margin: 6px 0 0;
        }

        .login-box {
            background: #fff;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid #e8e8e8;
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-control {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
            background: #fafafa;
            transition: all 0.2s;
        }

        .form-control:focus {
            background: #fff;
            border-color: #333;
            box-shadow: none;
            outline: none;
        }

        .btn-login {
            width: 100%;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.65rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #333;
        }

        .error-msg {
            background: #fff5f5;
            border: 1px solid #fcc;
            color: #c00;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
        }

        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 1.2rem 0;
        }
    </style>
</head>
<body>
    <div class="login-wrap">

        <div class="login-title">
            <h1>物料管理系統</h1>
            <p>MMS · Material Management System</p>
        </div>

        <div class="login-box">

            {% if form.errors %}
            <div class="error-msg">
                <i class="bi bi-exclamation-circle me-1"></i> 帳號或密碼錯誤
            </div>
            {% endif %}

            {% if messages %}
                {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="mb-3">
                    <label class="form-label">帳號</label>
                    <input type="text" name="username" class="form-control" placeholder="請輸入帳號" required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label">密碼</label>
                    <input type="password" name="password" class="form-control" placeholder="請輸入密碼" required>
                </div>

                <button type="submit" class="btn-login">登入</button>
            </form>

        </div>

    </div>
</body>
</html>
