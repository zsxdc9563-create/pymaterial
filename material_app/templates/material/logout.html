<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已登出 - MMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }

        .logout-wrap {
            width: 100%;
            max-width: 380px;
            padding: 0 20px;
            text-align: center;
        }

        .logout-icon {
            width: 72px;
            height: 72px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .logout-icon i {
            font-size: 2rem;
            color: #555;
        }

        .logout-box {
            background: #fff;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            border: 1px solid #e8e8e8;
        }

        .logout-box h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #111;
            margin-bottom: 0.5rem;
        }

        .logout-box p {
            font-size: 0.88rem;
            color: #999;
            margin-bottom: 2rem;
        }

        .btn-login-again {
            display: block;
            width: 100%;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.65rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login-again:hover {
            background: #333;
            color: #fff;
        }

        .system-name {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #bbb;
        }

        /* 3秒倒數條 */
        .countdown-bar {
            height: 3px;
            background: #eee;
            border-radius: 2px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .countdown-bar-inner {
            height: 100%;
            background: #111;
            border-radius: 2px;
            animation: countdown 3s linear forwards;
        }

        @keyframes countdown {
            from { width: 100%; }
            to   { width: 0%; }
        }
    </style>
</head>
<body>
    <div class="logout-wrap">
        <div class="logout-box">

            <div class="logout-icon">
                <i class="bi bi-box-arrow-right"></i>
            </div>

            <h2>已成功登出</h2>
            <p>感謝使用，將在 <span id="countdown">3</span> 秒後自動跳轉至登入頁</p>

            <div class="countdown-bar">
                <div class="countdown-bar-inner"></div>
            </div>

            <a href="/material/login/" class="btn-login-again">
                立即重新登入
            </a>

        </div>

        <div class="system-name">物料管理系統 · MMS</div>
    </div>

    <script>
        // 倒數計時
        let sec = 3;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            sec--;
            el.textContent = sec;
            if (sec <= 0) {
                clearInterval(timer);
                window.location.href = '/material/login/';
            }
        }, 1000);
    </script>
</body>
</html>
